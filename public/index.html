<!DOCTYPE html>
<html>
<body>

<h2>🔥 SanhSpin Pro 🔥</h2>

<input id="user" placeholder="Tài khoản">
<input id="pass" placeholder="Mật khẩu">
<button onclick="auth()">Đăng nhập</button>

<p id="info"></p>

<!-- VÒNG QUAY -->
<div style="position:relative;width:220px;margin:auto;">

<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);">
🔻
</div>

<div id="wheel" style="
width:200px;height:200px;border-radius:50%;
border:4px solid black;
transition:transform 3s ease-out;
background: conic-gradient(
red 0 45deg,
yellow 45deg 90deg,
green 90deg 135deg,
blue 135deg 180deg,
orange 180deg 225deg,
purple 225deg 270deg,
pink 270deg 315deg,
cyan 315deg 360deg
);
"></div>

</div>

<button onclick="spin()">🎡 QUAY</button>
<button onclick="reload()">🔄 Cập nhật</button>
<button onclick="loadHistory()">📜 Lịch sử</button>
<button onclick="nap()">💳 Nạp tiền</button>

<div id="napinfo"></div>
<div id="history"></div>

<script>
let user="", pass="";

let rewards = [0,1000,5000,10000,2000,3000,7000,9000];

// LOGIN
async function auth(){
  user=document.getElementById("user").value;
  pass=document.getElementById("pass").value;

  let res=await fetch("/auth",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user,pass})
  });

  let data=await res.json();

  if(data.msg){
    alert(data.msg);
    return;
  }

  update(data);
}

function update(data){
  document.getElementById("info").innerText=
    "💰 "+data.balance+" | 🎡 "+data.turns;
}

// QUAY
async function spin(){
  let wheel=document.getElementById("wheel");

  let res=await fetch("/spin",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user})
  });

  let data=await res.json();

  if(data.msg){
    alert(data.msg);
    return;
  }

  let deg = (360*5) + (data.index*45);
  wheel.style.transform="rotate("+deg+"deg)";

  setTimeout(()=>{
    alert("🎉 Trúng: "+rewards[data.index]+"đ");
    update(data);
  },3000);
}

// RELOAD
async function reload(){
  let res=await fetch("/auth",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user,pass})
  });

  let data=await res.json();
  update(data);
}

// LỊCH SỬ
async function loadHistory(){
  let res=await fetch("/history",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user})
  });

  let data=await res.json();

  document.getElementById("history").innerHTML=
    data.map(x=>"<p>"+x+"đ</p>").join("");
}

// NẠP TIỀN
function nap(){
  document.getElementById("napinfo").innerHTML=`
  <div style="border:1px solid #ccc;padding:10px;width:250px">
    <h3>💳 Nạp tiền</h3>

    <img src="qr.png" width="200"><br>

    <p>Ngân hàng: MB Bank</p>
    <p>STK: 0858931269</p>
    <p>Nội dung: nap_${user}</p>

    <button onclick="copy()">📋 Copy</button>
  </div>`;
}

function copy(){
  navigator.clipboard.writeText("nap_"+user);
  alert("Đã copy!");
}
</script>

</body>
</html>
